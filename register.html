<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel logowania</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="app.css"/>
</head>
<body>
    <div class="header">
        <nav>
            <img src="media/autodraw_25.07.2022-removebg-preview.png" class="logo">
            <ul class="nav-links">
                <li class="active"><a href="index.html">Strona główna</a></li>
                <li><a href="">O nas</a></li>
                <li><a href="">Kontakt</a></li>
                <li class="btn">Rejestracja</li>
            </ul>
        </nav>
    </div>
    <form action="">
        <div class='container'>
        <h1>Rejestracja</h1>
        <p>Proszę wypełnić formularz poniżej.</p>
        <hr/>
        <label for="fn"><b>Imię i nazwisko</b></label>
        <input type="text"  placeholder="Imię i nazwisko" name="fn" id="fn" required/>

        <label for="fn"><b>Adres E-Mail</b></label>
        <input type="email" placeholder="E-Mail" name="email" id="email" required/>

        <label for="psw"><b>Hasło</b></label>
        <input type="password" placeholder="Wprowadź swoje hasło" name="psw" id="psw" required/>

        <label for="cpsw"><b>Potwierdź hasło</b></label>
        <input type="password" placeholder="Potwierdź swoje hasło" name="cpsw" id="cpsw" required/>
        <hr/>
        <button class="button" type="submit"><b>Rejestracja</b></button>
        <footer><h5>Created by Kotanisko&reg;</h5></footer>
    </form>
</div>
</body>
</html>
